# ============================================================================
# Mimo — CI workflow (build sanity check on every PR)
# ============================================================================
#
# Runs on every push to a feature branch and every PR to main.
# Debug build + unit tests, no codesigning, no secrets needed.
# Catches Project.swift parse breaks, Swift compile errors, missing files,
# and — now that the MimoTests target is wired in — test regressions.
#
# ============================================================================

name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Tuist
        run: |
          brew install tuist
          tuist version

      - name: Tuist generate
        run: tuist generate --no-open

      - name: Build (Debug, unsigned)
        run: |
          xcodebuild build \
            -workspace Mimo.xcworkspace \
            -scheme Mimo \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Test (Debug, unsigned)
        run: |
          xcodebuild test \
            -workspace Mimo.xcworkspace \
            -scheme Mimo \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
