# ============================================================================
# Mimo — CI workflow (build sanity check on every PR)
# ============================================================================
#
# Runs on every push to a feature branch and every PR to main.
# Debug build, no codesigning, no secrets needed.
# Catches Project.swift parse breaks, Swift compile errors, missing files.
#
# ============================================================================

name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Tuist
        run: |
          brew install tuist
          tuist version

      - name: Tuist generate
        run: tuist generate --no-open

      - name: Build (Debug, unsigned)
        run: |
          xcodebuild build \
            -workspace Mimo.xcworkspace \
            -scheme Mimo \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
