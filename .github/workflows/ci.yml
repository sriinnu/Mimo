# ============================================================================
# Mimo — CI workflow (build sanity check on every PR)
# ============================================================================
#
# Runs on every push to a feature branch and every PR to main.
# Debug build, no codesigning, no secrets needed.
# Catches Project.swift parse breaks, Swift compile errors, missing files.
#
# ============================================================================

name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Tuist
        run: |
          brew install tuist
          tuist version

      - name: Tuist generate
        run: tuist generate --no-open

      - name: Build (Debug, unsigned)
        run: |
          xcodebuild build \
            -workspace Mimo.xcworkspace \
            -scheme Mimo \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
