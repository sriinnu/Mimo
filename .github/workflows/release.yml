# ============================================================================
# Mimo — Release workflow (codesign + notarize + Sparkle-sign + attach to release)
# ============================================================================
#
# Triggered when a GitHub Release is published with a tag like `v1.0.3`,
# OR manually via workflow_dispatch (pass the tag, e.g. v1.0.3, to rebuild
# and re-attach to an existing release).
#
# Steps:
#   1. Build the app via Tuist + xcodebuild
#   2. Codesign with Developer ID Application cert  (gated on BUILD_CERT_*)
#   3. Notarize via notarytool + .p8 API key        (gated on APPLE_API_*)
#   4. Staple the notarization ticket
#   5. Pack into DMG
#   6. Sign DMG via Sparkle's sign_update            (gated on SPARKLE_*)
#   7. Upload DMG to the Release + update appcast.xml
#
# Each step that needs a secret is gated. IMPORTANT: the `secrets` context is
# NOT allowed in step `if:` conditions, so secret presence is captured once
# into job-level `env` (HAS_CERT / HAS_API_KEY / HAS_SPARKLE) and the step
# `if:`s read those — not `secrets.*` directly.
#
# All third-party actions pinned to commit SHAs (mutable tags = supply-chain risk).
# ============================================================================

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build & attach (e.g. v1.0.3)"
        required: true

permissions:
  contents: write   # upload assets, push appcast.xml
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    # Dormant until signing is fully wired up. Flip on with:
    #   gh variable set RELEASE_ENABLED -b true
    if: ${{ vars.RELEASE_ENABLED == 'true' }}

    env:
      # tag_name on release events; the dispatch input otherwise.
      VERSION_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      APP_NAME: Mimo
      # Capture secret presence ONCE here — `secrets` is allowed in env, but
      # NOT in step `if:` conditions. Steps below branch on these.
      HAS_CERT: ${{ secrets.BUILD_CERT_P12_BASE64 != '' && 'true' || 'false' }}
      HAS_API_KEY: ${{ secrets.APPLE_API_KEY_P8_BASE64 != '' && secrets.BUILD_CERT_P12_BASE64 != '' && 'true' || 'false' }}
      HAS_SPARKLE: ${{ secrets.SPARKLE_PRIVATE_KEY != '' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Tuist
        run: |
          brew install tuist
          tuist version

      - name: Tuist generate
        run: tuist generate --no-open

      # ── Codesign — only when cert secrets are present ────────────────
      - name: Import Developer ID certificate
        if: ${{ env.HAS_CERT == 'true' }}
        env:
          CERT_B64: ${{ secrets.BUILD_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.BUILD_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN
          security set-keychain-settings -lut 3600 $KEYCHAIN
          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k $KEYCHAIN -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN
          rm /tmp/cert.p12

      - name: Build
        run: |
          xcodebuild \
            -workspace Mimo.xcworkspace \
            -scheme Mimo \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/Mimo.xcarchive \
            archive

      - name: Export .app
        if: ${{ env.HAS_CERT == 'true' }}
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>developer-id</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
          </dict></plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath build/Mimo.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist /tmp/ExportOptions.plist

      # ── Notarize — only when API key + cert secrets are present ───────
      - name: Notarize
        if: ${{ env.HAS_API_KEY == 'true' }}
        env:
          KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          KEY_P8: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          echo "$KEY_P8" | base64 --decode > /tmp/api_key.p8
          ditto -ck --rsrc --sequesterRsrc --keepParent build/export/Mimo.app build/Mimo.zip
          xcrun notarytool submit build/Mimo.zip \
            --key /tmp/api_key.p8 \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID" \
            --wait
          xcrun stapler staple build/export/Mimo.app
          rm /tmp/api_key.p8

      - name: Create DMG
        if: ${{ env.HAS_CERT == 'true' }}
        run: |
          mkdir -p release
          DMG_PATH="release/${APP_NAME}-${VERSION_TAG}.dmg"
          hdiutil create -volname "$APP_NAME" -srcfolder build/export/Mimo.app -ov -format UDZO "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Upload DMG to release
        if: ${{ env.DMG_PATH != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$VERSION_TAG" "$DMG_PATH" --clobber

      # ── Sparkle sign — best-effort. The DMG is already notarized + uploaded
      # above; this computes the EdDSA signature for Sparkle's appcast so
      # installed copies can auto-update. continue-on-error because a missing
      # signature only breaks auto-update, not the downloadable notarized DMG.
      - name: Sign DMG with Sparkle
        if: ${{ env.HAS_SPARKLE == 'true' && env.DMG_PATH != '' }}
        continue-on-error: true
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # Locate Sparkle's sign_update in the resolved framework. Avoid
          # `-perm +111` (deprecated/erratic on the macOS runner) — filter by
          # executability with test -x instead.
          SIGN_UPDATE=""
          while IFS= read -r -d '' f; do
            if [ -x "$f" ]; then SIGN_UPDATE="$f"; break; fi
          done < <(find "$HOME/Library/Developer/Xcode/DerivedData" . -name sign_update -type f -print0 2>/dev/null)
          if [ -z "$SIGN_UPDATE" ]; then echo "::error::sign_update binary not found"; exit 1; fi
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_priv
          chmod 600 /tmp/sparkle_priv
          SIGNATURE=$("$SIGN_UPDATE" -f /tmp/sparkle_priv "$DMG_PATH" 2>&1) || {
            echo "::error::sign_update failed: $SIGNATURE"; rm -f /tmp/sparkle_priv; exit 1;
          }
          rm -f /tmp/sparkle_priv
          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> "$GITHUB_ENV"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Mimo $VERSION_TAG"
            echo ""
            echo "| Step | Status |"
            echo "|---|---|"
            echo "| Build | ${{ job.status }} |"
            echo "| Codesign | ${{ env.HAS_CERT == 'true' && 'enabled' || 'SKIPPED (no cert)' }} |"
            echo "| Notarize | ${{ env.HAS_API_KEY == 'true' && 'enabled' || 'SKIPPED (no .p8)' }} |"
            echo "| Sparkle sign | ${{ env.HAS_SPARKLE == 'true' && 'enabled' || 'SKIPPED (no key)' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
